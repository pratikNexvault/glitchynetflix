<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NETFLIX TOKEN • GLITCHY DEV</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --cream: #fdf8f0;
            --cream-2: #faf3e8;
            --cream-3: #f5ead6;
            --rose: #e8846a;
            --rose-light: #f0a896;
            --rose-soft: #fde8e2;
            --teal: #4a9b8e;
            --teal-light: #72b8ad;
            --teal-soft: #e0f2ef;
            --gold: #c9973a;
            --gold-light: #e8c06a;
            --gold-soft: #fdf3dc;
            --text: #2a1f12;
            --muted: #8a7560;
            --border: rgba(201,151,58,0.2);
            --card: rgba(253,248,240,0.92);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ─── GRAIN TEXTURE ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* ─── BACKGROUND ─── */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
        }

        .blob-1 {
            width: 550px; height: 550px;
            background: radial-gradient(circle, #f5c5b5cc, #e8a08566);
            top: -200px; left: -180px;
            animation: driftA 18s ease-in-out infinite alternate;
            opacity: 0.55;
        }
        .blob-2 {
            width: 420px; height: 420px;
            background: radial-gradient(circle, #b2d8d2aa, #4a9b8e44);
            bottom: -120px; right: -100px;
            animation: driftB 14s ease-in-out infinite alternate;
            opacity: 0.5;
        }
        .blob-3 {
            width: 320px; height: 320px;
            background: radial-gradient(circle, #f0ddb0aa, #c9973a33);
            top: 38%; left: 55%;
            animation: driftC 20s ease-in-out infinite alternate;
            opacity: 0.45;
        }
        .blob-4 {
            width: 200px; height: 200px;
            background: radial-gradient(circle, #f7e8ff99, #d4a0e844);
            top: 20%; right: 15%;
            animation: driftD 12s ease-in-out infinite alternate;
            opacity: 0.4;
        }

        @keyframes driftA { to { transform: translate(60px, 80px) scale(1.05); } }
        @keyframes driftB { to { transform: translate(-50px, -60px) scale(1.08); } }
        @keyframes driftC { to { transform: translate(-70px, 50px) scale(0.95); } }
        @keyframes driftD { to { transform: translate(30px, -40px); } }

        /* ─── FLOATING ORBS ─── */
        .orb {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb linear infinite;
        }
        .orb-1 {
            width: 8px; height: 8px;
            background: var(--gold);
            top: 20%; left: 10%;
            opacity: 0.5;
            animation-duration: 8s;
            animation-delay: 0s;
        }
        .orb-2 {
            width: 5px; height: 5px;
            background: var(--teal);
            top: 60%; left: 85%;
            opacity: 0.4;
            animation-duration: 11s;
            animation-delay: -3s;
        }
        .orb-3 {
            width: 6px; height: 6px;
            background: var(--rose);
            top: 80%; left: 20%;
            opacity: 0.45;
            animation-duration: 9s;
            animation-delay: -5s;
        }
        .orb-4 {
            width: 4px; height: 4px;
            background: var(--gold-light);
            top: 35%; left: 75%;
            opacity: 0.5;
            animation-duration: 13s;
            animation-delay: -7s;
        }
        @keyframes floatOrb {
            0%   { transform: translateY(0px) scale(1); opacity: 0; }
            10%  { opacity: 0.5; }
            50%  { transform: translateY(-30px) scale(1.3); }
            90%  { opacity: 0.4; }
            100% { transform: translateY(-60px) scale(0.7); opacity: 0; }
        }

        /* ─── CONTAINER ─── */
        .container {
            position: relative;
            z-index: 2;
            width: 95%;
            max-width: 560px;
            background: var(--card);
            border: 1px solid rgba(201,151,58,0.25);
            border-radius: 32px;
            padding: 42px 36px 34px;
            box-shadow:
                0 2px 4px rgba(42,31,18,0.04),
                0 8px 24px rgba(201,151,58,0.08),
                0 32px 80px rgba(42,31,18,0.08),
                0 0 0 1px rgba(255,255,255,0.7) inset;
            backdrop-filter: blur(24px);
            animation: popIn 0.8s cubic-bezier(0.16,1,0.3,1) both;
        }
        @keyframes popIn {
            from { transform: translateY(32px) scale(0.96); opacity: 0; }
            to   { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* ─── HEADER ─── */
        .header { text-align: center; margin-bottom: 32px; }

        .logo-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #c9973a, #e8c06a);
            color: #2a1f12;
            padding: 6px 18px 6px 10px;
            border-radius: 50px;
            font-size: 0.6rem;
            letter-spacing: 3.5px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 14px;
            box-shadow: 0 4px 16px rgba(201,151,58,0.3);
            animation: pillFadeIn 0.9s 0.2s both;
        }
        @keyframes pillFadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .logo-pill .dot {
            width: 7px; height: 7px;
            background: #2a1f12;
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        .main-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1.05;
            letter-spacing: -0.5px;
            animation: titleFadeIn 0.9s 0.35s both;
        }
        @keyframes titleFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .main-title .accent {
            background: linear-gradient(135deg, #c9973a, #e8846a, #4a9b8e);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 5s ease-in-out infinite alternate;
        }
        @keyframes gradShift {
            0%   { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 9px;
            font-weight: 400;
            letter-spacing: 1px;
            animation: titleFadeIn 0.9s 0.5s both;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 16px auto 0;
            animation: titleFadeIn 0.9s 0.6s both;
        }
        .divider-line {
            width: 40px; height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--gold));
            border-radius: 10px;
        }
        .divider-line.right {
            background: linear-gradient(90deg, var(--gold), transparent);
        }
        .divider-gem {
            width: 6px; height: 6px;
            background: var(--gold);
            border-radius: 1px;
            transform: rotate(45deg);
            box-shadow: 0 0 8px rgba(201,151,58,0.5);
        }

        /* ─── LABEL ─── */
        .field-label {
            font-size: 0.62rem;
            letter-spacing: 2.5px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .field-label::before {
            content: '';
            width: 3px; height: 10px;
            background: linear-gradient(180deg, var(--gold), var(--rose));
            border-radius: 3px;
        }

        /* ─── TEXTAREA ─── */
        textarea {
            width: 100%;
            height: 115px;
            background: rgba(253,243,220,0.6);
            border: 1.5px solid rgba(201,151,58,0.2);
            border-radius: 16px;
            color: #2a1f12;
            padding: 14px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            resize: vertical;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            outline: none;
            line-height: 1.65;
        }
        textarea:focus {
            border-color: var(--gold-light);
            box-shadow: 0 0 0 4px rgba(201,151,58,0.1);
            background: rgba(255,252,245,0.95);
        }
        textarea::placeholder { color: #c4b49a; }

        /* ─── DEVICE BUTTONS ─── */
        .device-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 22px 0;
        }

        .device-btn {
            background: white;
            border: 1.5px solid rgba(201,151,58,0.18);
            border-radius: 20px;
            padding: 24px 15px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow: 0 2px 12px rgba(42,31,18,0.05);
        }

        .device-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(201,151,58,0.06), rgba(74,155,142,0.06));
            opacity: 0;
            transition: opacity 0.3s;
        }
        .device-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--rose), var(--teal));
            background-size: 200% 100%;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
            animation: gradShift 4s linear infinite;
        }
        .device-btn:hover {
            border-color: rgba(201,151,58,0.4);
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 50px rgba(42,31,18,0.12), 0 0 0 1px rgba(201,151,58,0.15);
        }
        .device-btn:hover::before { opacity: 1; }
        .device-btn:hover::after { transform: scaleX(1); }
        .device-btn:active { transform: translateY(-2px) scale(1); }

        .device-btn .icon-wrap {
            width: 52px; height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--gold-soft), var(--cream-3));
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 1;
            transition: transform 0.3s;
            box-shadow: 0 4px 12px rgba(201,151,58,0.15);
        }
        .device-btn:hover .icon-wrap { transform: scale(1.1) rotate(-4deg); }
        .device-btn i {
            font-size: 1.6rem;
            background: linear-gradient(135deg, var(--gold), var(--rose));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .device-btn span {
            font-size: 0.68rem;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }
        .device-btn .badge {
            position: absolute;
            top: 11px; right: 12px;
            font-size: 0.5rem;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            color: #2a1f12;
            padding: 2px 9px;
            border-radius: 20px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 2px 6px rgba(201,151,58,0.25);
        }

        /* ─── TELEGRAM BUTTON ─── */
        .tg-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background: linear-gradient(135deg, #2a1f12 0%, #3d2e1c 100%);
            color: var(--gold-light);
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            text-decoration: none;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 6px 28px rgba(42,31,18,0.25);
            margin-top: 2px;
        }
        .tg-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(232,192,106,0.15), transparent);
            transform: skewX(-20deg);
            transition: left 0.55s;
        }
        .tg-btn:hover::before { left: 150%; }
        .tg-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(42,31,18,0.3);
        }
        .tg-btn i { color: var(--gold-light); }

        /* ─── FOOTER ─── */
        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid rgba(201,151,58,0.15);
        }
        .developed {
            font-size: 0.68rem;
            letter-spacing: 1.5px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
        }
        .developed a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }
        .developed a:hover { color: var(--rose); }
        .heart {
            color: var(--rose);
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.35)} }

        .team-tag {
            display: inline-block;
            font-size: 0.58rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--gold-soft), var(--cream-3));
            color: var(--gold);
            border: 1px solid rgba(201,151,58,0.25);
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 8px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* ─── MODAL ─── */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(42,31,18,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: rgba(253,248,240,0.98);
            border: 1px solid rgba(201,151,58,0.25);
            border-radius: 28px;
            width: 92%;
            max-width: 500px;
            padding: 34px;
            box-shadow:
                0 30px 80px rgba(42,31,18,0.18),
                0 0 0 1px rgba(255,255,255,0.8) inset;
            animation: modalPop 0.45s cubic-bezier(0.16,1,0.3,1) both;
            position: relative;
        }
        @keyframes modalPop {
            from { transform: scale(0.82) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .modal-header .dot {
            width: 9px; height: 9px;
            background: linear-gradient(135deg, var(--gold), var(--rose));
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(201,151,58,0.6);
            animation: blink 1.6s ease-in-out infinite;
        }
        .modal-content h3 {
            font-family: 'Cormorant Garamond', serif;
            color: var(--text);
            font-size: 1.25rem;
            font-weight: 700;
        }
        .token-box {
            background: rgba(253,243,220,0.6);
            padding: 14px 16px;
            border-radius: 14px;
            font-family: 'JetBrains Mono', monospace;
            color: #5c3d0e;
            word-break: break-all;
            font-size: 0.79rem;
            line-height: 1.65;
            max-height: 170px;
            overflow-y: auto;
            border: 1px solid rgba(201,151,58,0.2);
            border-left: 3px solid var(--gold);
        }
        .token-box::-webkit-scrollbar { width: 4px; }
        .token-box::-webkit-scrollbar-track { background: var(--cream-2); }
        .token-box::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 4px; }

        .timer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            font-size: 0.77rem;
            color: var(--muted);
            font-weight: 600;
        }
        .timer-row i { color: var(--teal); }
        #modalCountdown {
            color: var(--gold);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-actions button, .modal-actions a {
            flex: 1;
            padding: 13px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.76rem;
            letter-spacing: 1.5px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            border: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .modal-actions button {
            background: linear-gradient(135deg, #2a1f12, #4a3520);
            color: var(--gold-light);
            box-shadow: 0 4px 18px rgba(42,31,18,0.2);
        }
        .modal-actions button:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(42,31,18,0.28); }
        .modal-actions a {
            background: linear-gradient(135deg, var(--gold-soft), #fce8c0);
            color: #78350f;
            border: 1px solid rgba(201,151,58,0.3);
        }
        .modal-actions a:hover { transform: translateY(-2px); }

        .close-modal {
            position: absolute;
            top: 14px; right: 16px;
            font-size: 1.1rem;
            color: var(--muted);
            cursor: pointer;
            width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            transition: background 0.2s, color 0.2s;
        }
        .close-modal:hover { background: var(--gold-soft); color: var(--gold); }

        /* ─── LOADER ─── */
        .loader-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 999;
            background: rgba(253,248,240,0.75);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
        }
        .loader-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .loader-ring {
            width: 50px; height: 50px;
            border: 3px solid rgba(201,151,58,0.15);
            border-top-color: var(--gold);
            border-right-color: var(--rose);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .loader-text {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── SCROLL REVEAL ─── */
        .reveal {
            opacity: 0;
            transform: translateY(16px);
            animation: reveal 0.6s ease both;
        }
        .reveal-1 { animation-delay: 0.5s; }
        .reveal-2 { animation-delay: 0.65s; }
        .reveal-3 { animation-delay: 0.8s; }
        .reveal-4 { animation-delay: 0.95s; }
        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .container { padding: 28px 20px 24px; }
            .main-title { font-size: 2.3rem; }
            .modal-content { padding: 26px 18px; }
        }
    </style>
</head>
<body>

<div class="bg-layer">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>
</div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<!-- LOADER -->
<div class="loader-overlay" id="loaderOverlay">
    <div class="loader-wrap">
        <div class="loader-ring"></div>
        <div class="loader-text">Generating...</div>
    </div>
</div>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="logo-pill">
            <div class="dot"></div>
            Glitchy Dev
        </div>
        <div class="main-title">Netflix <span class="accent">Token</span><br>Generator</div>
        <div class="subtitle">Paste your cookies &amp; generate instantly</div>
        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-gem"></div>
            <div class="divider-line right"></div>
        </div>
    </div>

    <!-- TEXTAREA -->
    <div class="field-label reveal reveal-1">Paste Cookies</div>
    <textarea id="cookieInput" class="reveal reveal-1" placeholder="Paste your Netflix cookies here..."></textarea>

    <!-- DEVICE BUTTONS -->
    <div class="device-buttons reveal reveal-2">
        <button class="device-btn" onclick="generateToken('mobile')">
            <div class="badge">Fast</div>
            <div class="icon-wrap"><i class="fas fa-mobile-alt"></i></div>
            <span>Mobile Token</span>
        </button>
        <button class="device-btn" onclick="generateToken('desktop')">
            <div class="badge">HD</div>
            <div class="icon-wrap"><i class="fas fa-desktop"></i></div>
            <span>PC Token</span>
        </button>
    </div>

    <!-- TELEGRAM -->
    <a href="https://t.me/glitchydev" target="_blank" class="tg-btn reveal reveal-3">
        <i class="fab fa-telegram"></i>
        Join Glitchy Dev
    </a>

    <!-- FOOTER -->
    <div class="footer reveal reveal-4">
        <div class="developed">
            Dev by <a href="https://t.me/glitchydev" target="_blank">Glitchy</a>
            &nbsp;✕&nbsp;
            <a href="https://t.me/glitchydev" target="_blank">Glitchy Team</a>
            &nbsp;<span class="heart">♥</span>
        </div>
        <div class="team-tag">✦ Glitchy Team ✦</div>
    </div>

</div>

<!-- ─── MODAL ─── -->
<div id="tokenModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">✕</span>
        <div class="modal-header">
            <div class="dot"></div>
            <h3 id="modalDeviceLabel"></h3>
        </div>
        <div class="field-label">Generated Token URL</div>
        <div class="token-box" id="modalTokenUrl"></div>
        <div class="timer-row">
            <i class="fas fa-clock"></i>
            Expires in &nbsp;<span id="modalCountdown">—</span>
        </div>
        <div class="modal-actions">
            <button onclick="copyToken()">
                <i class="fas fa-copy"></i>&nbsp; Copy
            </button>
            <a id="modalOpenLink" href="#" target="_blank">
                <i class="fas fa-external-link-alt"></i>&nbsp; Open
            </a>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = '/api/generate.js';

    let currentToken = null;
    let expiryTimestamp = null;
    let countdownInterval = null;

    async function generateToken(device) {
        const cookie = document.getElementById('cookieInput').value.trim();
        if (!cookie) {
            alert("Bhai cookie daal pehle! 🔥");
            return;
        }

        document.getElementById('loaderOverlay').style.display = 'flex';

        try {
            const res = await fetch(BACKEND_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ cookie, device })
            });

            const data = await res.json();

            if (data.error) {
                alert("Bhai ye Cookie expired hai koi aur daal 🔥");
                return;
            }

            currentToken = data.url;
            expiryTimestamp = data.expires_ts;

            document.getElementById('modalDeviceLabel').textContent =
                device === 'mobile' ? '📱 Mobile Token Ready' : '🖥️ Desktop Token Ready';

            document.getElementById('modalTokenUrl').textContent = currentToken;
            document.getElementById('modalOpenLink').href = currentToken;

            document.getElementById('tokenModal').style.display = 'flex';
            startCountdown(expiryTimestamp);

        } catch (err) {
            alert("Network error, bhai retry kar");
        } finally {
            document.getElementById('loaderOverlay').style.display = 'none';
        }
    }

    function startCountdown(expireTs) {
        clearInterval(countdownInterval);
        function update() {
            const diff = expireTs - Math.floor(Date.now() / 1000);
            if (diff <= 0) {
                document.getElementById('modalCountdown').textContent = 'EXPIRED';
                return;
            }
            const h = Math.floor(diff / 3600);
            const m = Math.floor((diff % 3600) / 60);
            document.getElementById('modalCountdown').textContent = `${h}h ${m}m`;
        }
        update();
        countdownInterval = setInterval(update, 60000);
    }

    function copyToken() {
        if (!currentToken) return;
        navigator.clipboard.writeText(currentToken);
        const btn = event.currentTarget;
        const orig = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i>&nbsp; Copied!';
        setTimeout(() => btn.innerHTML = orig, 2000);
    }

    function closeModal() {
        document.getElementById('tokenModal').style.display = 'none';
        clearInterval(countdownInterval);
    }
</script>

</body>
</html>
